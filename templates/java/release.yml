name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  packages: write
jobs:
  build:
    name: Build (sources + javadoc + jars)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Package
        run: mvn -B -ntp package -DskipTests
      - name: Stage jars
        run: |
          mkdir -p staging
          find target -maxdepth 1 -type f -name '*.jar' -exec cp {} staging/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: staging
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: jars, path: staging }
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: staging/*
  publish-github-packages:
    # GitHub Packages 使用自动 GITHUB_TOKEN，无需额外 secret。
    # 如需发布到 Maven Central，参考 references/registry-secrets.md 配置 OSSRH/GPG。
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    env:
      MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    if: ${{ env.MAVEN_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Deploy
        run: mvn -B -ntp deploy -DskipTests -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
        env:
          MAVEN_USERNAME: ${{ github.actor }}
