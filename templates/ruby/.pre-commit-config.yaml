repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
  - repo: https://github.com/rubocop/rubocop
    rev: v1.65.1
    hooks:
      - id: rubocop
  - repo: local
    hooks:
      - id: brakeman
        name: Brakeman (Rails)
        entry: bundle exec brakeman --no-exit-on-warn
        language: system
        files: \.rb$
        pass_filenames: false
      - id: bundle-audit
        name: bundle-audit
        entry: bundle exec bundle-audit check
        language: system
        files: ^Gemfile\.lock$
        pass_filenames: false
