name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    name: Build gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rake build
      - uses: actions/upload-artifact@v4
        with:
          name: gem
          path: pkg/*.gem
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: gem, path: pkg }
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: pkg/*.gem
  publish-rubygems:
    # 配置 RUBYGEMS_API_KEY 后自动发布；否则跳过。
    name: Publish to RubyGems
    needs: build
    runs-on: ubuntu-latest
    env:
      GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
    if: ${{ env.GEM_HOST_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rake build
      - name: Push gem
        run: gem push pkg/*.gem
