AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "node_modules/**/*"
    - "tmp/**/*"

Layout/LineLength:
  Max: 120
Layout/EndOfLine:
  EnforcedStyle: lf

Metrics/MethodLength:
  Max: 20
Metrics/AbcSize:
  Max: 25
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Style/Documentation:
  Enabled: false
Style/FrozenStringLiteralComment:
  Enabled: true
