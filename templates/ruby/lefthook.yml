pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      run: bundle exec rubocop
    brakeman:
      run: "bundle exec brakeman --no-exit-on-warn 2>/dev/null || true"
    bundle-audit:
      run: "bundle exec bundle-audit check 2>/dev/null || true"
commit-msg:
  commands:
    conventional:
      run: 'test "$(grep -cE ''^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'' "$1")" = 1'
