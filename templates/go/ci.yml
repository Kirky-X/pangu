name: CI
on:
  push:
    branches: [main, master]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-go-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality:
    name: Quality (gofmt + vet + golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          [ -z "$out" ] || { echo "::error::gofmt failed:"; echo "$out"; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
  test:
    name: Test + Coverage (≥80%)
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Test with race + coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          cov=$(go tool cover -func=coverage.out | awk '/^total:/{print $3}')
          echo "Total line coverage: $cov"
          awk -v c="${cov%\%}" 'BEGIN{exit !(c+0 < 80)}' && \
            { echo "::error::Coverage $cov < 80%"; exit 1; } || true
      - name: Upload coverage
        if: ${{ env.CODECOV_TOKEN != '' }}
        run: curl -s https://codecov.io/bash | bash -s -- -f coverage.out || true
  security:
    name: Security (govulncheck + gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec（对应 Go→Gosec）
        uses: securego/gosec@master
        with:
          args: -severity medium -quiet ./...
