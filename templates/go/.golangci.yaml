run:
  timeout: 5m
  go: "1.22"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec  # 安全审查（对应 Go→Gosec）
    - revive
    - gocritic
    - misspell
    - gofmt
    - goimports
linters-settings:
  gosec:
    severity: medium
    confidence: medium
  gofmt:
    simplify: true
issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec]
  max-issues-per-linter: 0
  max-same-issues: 0
