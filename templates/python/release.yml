# Python Release：tag (v*) → 构建 sdist+wheel → GitHub Release → 条件发布 PyPI
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras --dev
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create Release with sdist/wheel
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  # 仅当配置了 PYPI_API_TOKEN 才发布到 PyPI；否则跳过，不报错。
  publish-pypi:
    name: Publish to PyPI (条件)
    needs: github-release
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    if: ${{ env.PYPI_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: uv publish
        run: uv publish --token "${PYPI_API_TOKEN}"
