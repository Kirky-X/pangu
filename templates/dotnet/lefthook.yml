pre-commit:
  parallel: true
  commands:
    dotnet-format:
      glob: "*.cs"
      run: dotnet format --verify-no-changes --severity warn
    dotnet-vulnerable:
      run: dotnet list package --vulnerable --include-transitive
commit-msg:
  commands:
    conventional:
      run: 'test "$(grep -cE ''^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'' "$1")" = 1'
