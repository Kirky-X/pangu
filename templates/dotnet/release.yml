name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    name: Build nupkg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack -c Release -p:PackageVersion="$VERSION" -o artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: nupkg, path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
  publish-nuget:
    name: Publish to NuGet（条件发布）
    needs: build
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/download-artifact@v4
        with: { name: nupkg, path: artifacts }
      - name: Publish
        if: ${{ env.NUGET_API_KEY != '' }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
      - name: Skip（未配置 NUGET_API_KEY）
        if: ${{ env.NUGET_API_KEY == '' }}
        run: echo "NUGET_API_KEY 未配置，跳过发布。参考 references/registry-secrets.md 配置后重跑。"
