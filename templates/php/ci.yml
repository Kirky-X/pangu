name: CI
on:
  push:
    branches: [main, master]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-php-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality:
    name: Quality (php-cs-fixer + Psalm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: xdebug
          tools: composer, php-cs-fixer
      - run: composer install --no-interaction --prefer-dist
      - name: php-cs-fixer
        run: php-cs-fixer fix --dry-run --using-cache=no --diff
      - name: Psalm（含安全审查，对应 PHP→Psalm）
        run: vendor/bin/psalm --no-cache || true
  test:
    name: Test + Coverage (≥80% line)
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: xdebug
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - name: PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover coverage.xml
      - name: Enforce 80% line coverage
        run: |
          php -r '
            $c = simplexml_load_file("coverage.xml");
            $m = $c->project->metrics;
            $total = (int) $m["statements"];
            $covered = (int) $m["coveredstatements"];
            if ($total === 0) { echo "No statements\n"; exit(1); }
            $pct = $covered / $total * 100;
            printf("Line coverage: %.2f%% (%d/%d)\n", $pct, $covered, $total);
            exit($pct >= 80.0 ? 0 : 1);
          '
      - name: Upload coverage
        if: ${{ env.CODECOV_TOKEN != '' }}
        run: curl -s https://codecov.io/bash | bash -s -- -f coverage.xml || true
  security:
    name: Security (composer audit + Psalm taint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - name: composer audit（依赖 CVE）
        run: composer audit
      - name: Psalm taint analysis（污点分析）
        run: vendor/bin/psalm --taint-analysis --no-cache || true
