pre-commit:
  parallel: true
  commands:
    php-cs-fixer:
      glob: "*.php"
      run: php-cs-fixer fix --dry-run --using-cache=no --diff
    psalm:
      glob: "*.php"
      run: vendor/bin/psalm --no-cache
    composer-audit:
      run: composer audit
commit-msg:
  commands:
    conventional:
      run: 'test "$(grep -cE ''^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'' "$1")" = 1'
