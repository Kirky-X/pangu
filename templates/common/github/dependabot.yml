# Dependabot 依赖更新（GitHub 原生）。
# 通用部分：仅监控 GitHub Actions 版本（所有项目都有 CI）。
# 语言生态依赖（cargo/pip/npm/maven/go/composer/nuget）请按需在下面取消注释。
version: 2
updates:
  # 1) GitHub Actions 版本（通用，所有语言都适用）
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]

  # 2) 语言生态依赖 — 按项目实际使用取消注释（仅保留对应一行）:
  # Rust:       package-ecosystem: cargo        directory: /
  # Python:     package-ecosystem: pip          directory: /
  # Node:       package-ecosystem: npm          directory: /
  # Java:       package-ecosystem: maven        directory: /
  # Go:         package-ecosystem: gomod        directory: /
  # Ruby:       package-ecosystem: bundler      directory: /
  # PHP:        package-ecosystem: composer     directory: /
  # .NET:       package-ecosystem: nuget        directory: /
  #
  # 示例（Rust）:
  # - package-ecosystem: cargo
  #   directory: /
  #   schedule: { interval: weekly, day: monday }
  #   open-pull-requests-limit: 5
  #   labels: [dependencies, rust]
